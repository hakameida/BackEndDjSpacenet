version: '3.9'

services:
  web:
    build: .
    container_name: django_app
    volumes:
      - ./app/static:/app/static
      - ./app/media:/app/media
    env_file:
      - .env
    expose:
      - 8000

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "80:80"
    volumes:
      - ./app/static:/app/static
      - ./app/media:/app/media
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
